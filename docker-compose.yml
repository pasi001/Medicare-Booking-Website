services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medicare-backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      CLIENT_SITE_URL: http://localhost:5173
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev          # ← changed to dev Dockerfile
    container_name: medicare-frontend
    env_file:
      - ./frontend/.env
    environment:
      VITE_BACKEND_BASEURL: http://localhost:5001
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
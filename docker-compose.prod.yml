services:
  backend:
    image: pasindu2001/medicare-backend:latest
    container_name: medicare-backend
    environment:
      PORT: 5000
      MONGO_URI: ${MONGO_URI}
      CLIENT_SITE_URL: http://${EC2_PUBLIC_IP}
    ports:
      - "5000:5000"
    restart: always

  frontend:
    image: pasindu2001/medicare-frontend:latest
    container_name: medicare-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always